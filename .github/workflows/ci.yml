name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build backend Docker image
        run: docker build -t backend ./golang-gin-realworld-example-app

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          cd angular-realworld-example-app
          npm install --legacy-peer-deps

      - name: Build frontend Docker image
        run: docker build -t frontend ./angular-realworld-example-app