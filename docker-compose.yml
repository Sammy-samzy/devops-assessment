services:
  backend:
    build:
      context: ./golang-gin-realworld-example-app
    container_name: backend
    environment:
      - PORT=8080
      - GIN_MODE=release
      - DB_PATH=./data/gorm.db
    volumes:
      - sqlite_data:/app/data
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./angular-realworld-example-app
    container_name: frontend
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

volumes:
  sqlite_data:

networks:
  app-network:
    driver: bridge